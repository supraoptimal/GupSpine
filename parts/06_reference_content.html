function showRefSection(section) {
  currentRefSection = section;
  var btns = document.querySelectorAll('.ref-nav-btn');
  btns.forEach(function(b) {
    b.classList.remove('active');
    var onclick = b.getAttribute('onclick') || '';
    if (onclick.indexOf("'" + section + "'") !== -1) {
      b.classList.add('active');
    }
  });

  var el = document.getElementById('refContent');
  switch(section) {
    case 'workflow': el.innerHTML = renderRefWorkflow(); break;
    case 'timing': el.innerHTML = renderRefTiming(); break;
    case 'assessment': el.innerHTML = renderRefAssessment(); break;
    case 'steroids': el.innerHTML = renderRefSteroids(); break;
    case 'consent': el.innerHTML = renderRefConsent(); break;
    case 'theatre': el.innerHTML = renderRefTheatre(); break;
    case 'scores': el.innerHTML = renderRefScores(); calcState = {}; break;
    case 'contacts': el.innerHTML = renderRefContacts(); break;
    case 'references': el.innerHTML = renderRefReferences(); break;
    default: el.innerHTML = '';
  }

  // Post-render initialisation
  if (section === 'steroids') {
    setTimeout(renderDexTaper, 0);
  }
  if (section === 'theatre') {
    theatreFilter = 'All';
    theatreSearch = '';
  }
}

function scrollToRef(id) {

    currentTab = 'reference';
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });

    document.getElementById('tabReference').classList.add('active');
    document.getElementById('contentReference').classList.add('active');
  }
  if (currentRefSection !== 'references') {
    showRefSection('references');
  }
  setTimeout(function() {
    var el = document.getElementById('ref-item-' + id);
    if (el) {
      el.scrollIntoView({behavior: 'smooth', block: 'center'});
      el.style.transition = 'background 1.6s ease';
      el.style.background = '#fff4cc';
      setTimeout(function() { el.style.background = ''; }, 1600);
    }
  }, 150);
}

function toggleCollapsible(header) {

  if (c) c.classList.toggle('open');
}

function renderRefAssessment() {
  return `
    <div class="section-header">Neurological Assessment (ASIA)</div>
    <div class="step-card">
      <div class="warning-box" style="margin-bottom:12px;">
        <div class="warn-title">First Step</div>
        Exclude persistent spinal shock and check the bulbocavernosus reflex before formal ASIA classification. ${refLink(31)}
      </div>
      <p>The ASIA (American Spinal Injury Association) Impairment Scale is the standard tool for assessing neurological function in spinal cord injuries. ${refLink(30)} While a full assessment may not always be feasible in acute cases, its principles are still applicable.</p>
      <p>Spinal shock is characterised by flaccid, areflexic paralysis with an absent bulbocavernosus reflex. This is distinct from neurogenic shock and typically resolves within 48 hours. Return of the bulbocavernosus reflex indicates the end of spinal shock.</p>
    </div>

    <div class="collapsible open">
      <button class="collapsible-header" onclick="toggleCollapsible(this)">
        ASIA Classification Steps
        <span class="chevron">&#9660;</span>
      </button>
      <div class="collapsible-body">
        <a href="https://asia-spinalinjury.org/wp-content/uploads/2019/04/ASIA-ISCOS-IntlWorksheet_2019.pdf" target="_blank" rel="noopener" class="asia-chart-thumb">
          <div class="asia-chart-icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="8" y="4" width="32" height="40" rx="3" fill="#fff" stroke="#2a7d8a" stroke-width="2"/>
              <rect x="14" y="12" width="8" height="2" rx="1" fill="#2a7d8a" opacity="0.6"/>
              <rect x="14" y="17" width="20" height="1.5" rx="0.75" fill="#ccc"/>
              <rect x="14" y="21" width="18" height="1.5" rx="0.75" fill="#ccc"/>
              <rect x="14" y="25" width="20" height="1.5" rx="0.75" fill="#ccc"/>
              <rect x="14" y="29" width="16" height="1.5" rx="0.75" fill="#ccc"/>
              <rect x="14" y="33" width="19" height="1.5" rx="0.75" fill="#ccc"/>
              <text x="24" y="44" text-anchor="middle" font-size="5" fill="#2a7d8a" font-weight="600">PDF</text>
            </svg>
          </div>
          <div class="asia-chart-label">
            <span class="asia-chart-title">ASIA/ISCoS 2019 ISNCSCI Worksheet</span>
            <span class="asia-chart-hint">Tap to view full chart (PDF)</span>
          </div>
        </a>
        <ol class="content-list">
          <li><strong>Exclude persistent spinal shock</strong><br>Check for the bulbocavernosus reflex</li>
          <li><strong>Determine neurological level of injury (NLI)</strong>
            <ul style="margin-top:6px;">
              <li>Test pin prick sensation in descending manner on one side of the body</li>
              <li>If abnormal sensation is found, test the same dermatome on the contralateral side</li>
              <li>Test other sensory modalities (e.g. light touch) to identify the most caudal intact dermatome</li>
            </ul>
          </li>
          <li><strong>Determine motor level</strong>
            <ul style="margin-top:6px;">
              <li>Test key muscles at level corresponding to sensory level and at additional levels rostral and caudal</li>
              <li>Most caudal muscle with grade &ge;3 and all muscles rostral with grade 5</li>
              <li>If no myotome is present, motor level is presumed same as sensory level</li>
            </ul>
          </li>
          <li><strong>Determine presence of sacral sparing</strong>
            <ul style="margin-top:6px;">
              <li>S4&ndash;5 sensation for light-touch and pin-prick</li>
              <li>Deep anal pressure (DAP)</li>
              <li>Voluntary anal contraction (VAC)</li>
            </ul>
          </li>
          <li><strong>Classify injury and assign AIS grade (A&ndash;E)</strong></li>
        </ol>
      </div>
    </div>

    <div class="collapsible open">
      <button class="collapsible-header" onclick="toggleCollapsible(this)">
        AIS Grades
        <span class="chevron">&#9660;</span>
      </button>
      <div class="collapsible-body">
        <table class="data-table">
          <thead><tr><th>AIS</th><th>Definition</th><th>SCI Lesion</th></tr></thead>
          <tbody>
            <tr><td><strong>A</strong></td><td>No sensory or motor function preserved in sacral segments S4&ndash;5</td><td>Complete</td></tr>
            <tr><td><strong>B</strong></td><td>Sensory but not motor function preserved below neurological level, includes S4&ndash;5</td><td>Incomplete</td></tr>
            <tr><td><strong>C</strong></td><td>Motor function preserved; more than half key muscles below NLI have grade &lt;3</td><td>Incomplete</td></tr>
            <tr><td><strong>D</strong></td><td>Motor function preserved; at least half key muscles below NLI have grade &ge;3</td><td>Incomplete</td></tr>
            <tr><td><strong>E</strong></td><td>Motor and sensory function normal</td><td>None</td></tr>
          </tbody>
        </table>
        <p style="font-size:0.78rem;color:var(--grey-500);margin-top:8px;">Source: ASIA/ISCoS 2019 revision of ISNCSCI ${refLink(30)}</p>
      </div>
    </div>

    <div class="collapsible">
      <button class="collapsible-header" onclick="toggleCollapsible(this)">
        Functional Walking Prediction by AIS Grade
        <span class="chevron">&#9660;</span>
      </button>

        <table class="data-table">
          <thead><tr><th>AIS / Feature at Admission</th><th>Community Walking at 1 Year</th></tr></thead>

            <tr><td>AIS A &mdash; Cervical</td><td>0%</td></tr>
            <tr><td>AIS A &mdash; Thoracic/Lumbar</td><td>5&ndash;8.5%</td></tr>
            <tr><td>AIS B &mdash; Light touch only</td><td>0&ndash;33%</td></tr>
            <tr><td>AIS B &mdash; Light touch + pinprick</td><td>66&ndash;89%</td></tr>

            <tr><td>AIS D &mdash; Age &gt;50 years</td><td>80&ndash;100%</td></tr>

      </div>
    </div>`;
}

function renderRefSteroids() {
  return `
    <div class="section-header">Corticosteroids</div>

    <div class="collapsible open">
      <button class="collapsible-header" onclick="toggleCollapsible(this)">
        Dexamethasone for MESCC (Malignancy)
        <span class="chevron">&#9660;</span>
      </button>
      <div class="collapsible-body">
        <ul class="content-list">
          <li><strong>Indication:</strong> Metastatic epidural spinal cord compression (MESCC) before definitive treatment</li>
          <li><strong>Regimen:</strong> Dexamethasone 10 mg IV bolus, then 16 mg PO daily</li>
          <li><strong>After definitive treatment:</strong> Halve total daily dose every 3 days</li>
          <li><strong>Precautions:</strong> Co-administer proton-pump inhibitors (PPI); consider checking HBsAg</li>
          <li><strong>Side effects:</strong> Diabetes, myopathy, osteoporosis, gastritis, Cushing&rsquo;s syndrome, thromboembolic events, immunosuppression, sepsis, psychiatric disorder</li>
        </ul>
        <p style="font-size:0.78rem;color:var(--grey-500);margin-top:4px;">${refLink(39)}</p>

        <div class="steroid-calc">
          <label for="dexTaperSteps">Taper periods (every 3 days):</label>
          <input type="number" id="dexTaperSteps" value="5" min="1" max="8" oninput="renderDexTaper()">
          <div id="dexTaperResult" class="steroid-result"></div>
        </div>
      </div>
    </div>

    <div class="collapsible">
      <button class="collapsible-header" onclick="toggleCollapsible(this)">
        Methylprednisolone for Traumatic SCI (AO Spine Option)
        <span class="chevron">&#9660;</span>
      </button>
      <div class="collapsible-body">
        <div class="danger-box">
          <strong>Corticosteroid use in traumatic SCI is not standard of care.</strong> High-dose methylprednisolone is an optional, case-selected protocol only.
        </div>

        <p>The NASCIS trials examined high-dose methylprednisolone in acute SCI ${refLink(33)} but faced criticism for methodology, particularly post-hoc analysis. Subsequent trials have struggled to replicate findings. ${refLink(34)}</p>
        <p>A 48-hour infusion of MP poses risks including infections, GI ulcers, prolonged ICU stays, and increased mortality. ${refLink(35)}</p>
        <p>In 2013, the Congress of Neurological Surgeons issued a <strong>Level 1 recommendation against</strong> using methylprednisolone for acute SCI. ${refLink(36)} High-dose steroids are now considered an option rather than standard treatment. ${refLink(37)}</p>

        <h3>AO Spine Regimen ${refLink(38)}</h3>
        <ul class="content-list">
          <li><strong>Indication:</strong> Non-penetrating traumatic SCI within &le;8 hours of injury</li>
          <li><strong>Drug:</strong> Methylprednisolone (MP)</li>
          <li><strong>Dosage:</strong> 30 mg/kg IV over 1 hour, then 5.4 mg/kg/hour for 23 hours</li>
        </ul>

        <h3>Contra-indications</h3>
        <ul class="content-list">
          <li>Multiply injured patient</li>
          <li>Penetrating spinal cord injury</li>
          <li>Glucose intolerance or diabetes mellitus</li>
          <li>Multiple medical comorbidities or impaired immune system</li>
          <li>Elderly patients</li>
          <li>Pregnant patients</li>
          <li>Complete thoracic SCI (ASIA A)</li>
        </ul>

        <div class="steroid-calc">
          <label for="mpWeight">Patient weight (kg):</label>
          <input type="number" id="mpWeight" value="" min="30" max="200" placeholder="e.g. 70" oninput="renderMpDose()">
          <label for="mpHours">Hours since injury:</label>
          <input type="number" id="mpHours" value="" min="0" max="24" placeholder="e.g. 4" oninput="renderMpDose()">
          <div id="mpDoseResult" class="steroid-result"></div>
        </div>
      </div>
    </div>

    <div class="info-box" style="margin-top:12px;">
      <strong>Summary:</strong> Steroids are generally <strong>not recommended</strong> for traumatic SCI. Steroids are generally <strong>recommended</strong> for malignant epidural cord compression. ${refLink([38,39])}
    </div>`;
}

// Dexamethasone taper calculator
function renderDexTaper() {
  var el = document.getElementById('dexTaperResult');
  if (!el) return;
  var steps = Math.max(1, Math.min(8, Number(document.getElementById('dexTaperSteps').value) || 5));
  var dose = 16;
  var html = '<div style="font-weight:700;margin-bottom:8px;color:var(--navy);">Suggested Taper Schedule</div>';
  html += '<div class="dose-line"><span class="dose-value">Day 0:</span> Dexamethasone 10 mg IV bolus</div>';
  html += '<div class="dose-line"><span class="dose-value">Ongoing:</span> 16 mg PO daily until definitive treatment</div>';
  html += '<div style="margin:8px 0 4px;font-size:0.8rem;color:var(--grey-500);">After definitive treatment:</div>';
  for (var i = 0; i < steps; i++) {
    var dayStart = (i * 3) + 1;
    var dayEnd = (i * 3) + 3;
    var display = dose < 1 ? dose.toFixed(2) : (dose < 4 ? dose.toFixed(1) : dose.toFixed(0));
    html += '<div class="dose-line"><span class="dose-value">Days ' + dayStart + '\u2013' + dayEnd + ':</span> ' + display + ' mg/day</div>';
    dose = dose / 2;
  }
  html += '<div style="margin-top:8px;font-size:0.78rem;color:var(--grey-500);">Halve total daily dose every 3 days after definitive treatment.</div>';
  el.innerHTML = html;
}

// Methylprednisolone dose calculator
function renderMpDose() {
  var el = document.getElementById('mpDoseResult');
  if (!el) return;
  var weight = Number(document.getElementById('mpWeight').value);
  var hoursVal = document.getElementById('mpHours').value.trim();

  if (!weight || weight < 30) {
    el.innerHTML = '<div style="font-size:0.85rem;color:var(--grey-500);">Enter patient weight to calculate dosing.</div>';
    return;
  }

  var bolus = weight * 30;
  var infusionRate = weight * 5.4;
  var infusionTotal = infusionRate * 23;

  var html = '<div style="font-weight:700;margin-bottom:8px;color:var(--navy);">Calculated Dosing</div>';
  html += '<div class="dose-line"><span class="dose-value">Bolus:</span> ' + bolus.toFixed(0) + ' mg IV over 1 hour</div>';
  html += '<div class="dose-line"><span class="dose-value">Infusion:</span> ' + infusionRate.toFixed(1) + ' mg/hour for 23 hours</div>';
  html += '<div class="dose-line"><span class="dose-value">Total infusion:</span> ' + infusionTotal.toFixed(0) + ' mg</div>';

  if (hoursVal !== '') {
    var h = Number(hoursVal);
    if (h <= 8) {
      html += '<div class="info-box" style="margin-top:8px;"><strong>Within &le;8h protocol window</strong> (if no contraindications).</div>';
    } else {
      html += '<div class="warning-box" style="margin-top:8px;"><div class="warn-title">Outside protocol window</div>Beyond &le;8 hours from injury. Guideline does not support routine use beyond this window.</div>';
    }
  }

  el.innerHTML = html;
}

function renderRefConsent() {
  return `
    <div class="section-header">Consenting</div>
    <div class="step-card">
      <p style="font-size:0.85rem;">Obtaining valid consent requires ensuring the patient is fully informed and free to decide without undue pressure. Informed consent is possible if the patient is clearly informed about:</p>
      <ul class="content-list" style="font-size:0.85rem;">
        <li>The objectives and benefits of the proposed treatment</li>
        <li>Realistic expectations regarding outcomes</li>
        <li>The risks involved, including rare but significant complications</li>
        <li>Alternative treatment options</li>
      </ul>
    </div>

    <div class="collapsible open">
      <button class="collapsible-header" onclick="toggleCollapsible(this)">
        Objectives &amp; Benefits
        <span class="chevron">&#9660;</span>
      </button>
      <div class="collapsible-body">
        <p style="font-size:0.85rem;">The specific surgical approach, implant types, and number of spinal levels may vary based on intra-operative findings. Main goals typically include:</p>
        <ul class="content-list" style="font-size:0.85rem;">
          <li><strong>Decompression:</strong> Relieving pressure on the spinal cord or nerves</li>
          <li><strong>Stabilisation:</strong> Providing stability through instrumentation and/or fusion</li>
          <li><strong>Control of local tumour or infection:</strong> Managing or reducing tumour/sepsis in the affected area</li>
          <li><strong>Obtaining specimens:</strong> Collecting tissue samples for further diagnosis</li>
        </ul>
        <div class="info-box" style="font-size:0.85rem;">The primary benefit of decompression is to <strong>prevent further neurological deterioration</strong>. Neurological improvement is possible but cannot be guaranteed.</div>
      </div>
    </div>

    <div class="collapsible">
      <button class="collapsible-header" onclick="toggleCollapsible(this)">
        Expectations &amp; Recovery
        <span class="chevron">&#9660;</span>
      </button>
      <div class="collapsible-body" style="font-size:0.85rem;">
        <div class="warning-box" style="margin-bottom:12px;">
          <div class="warn-title">Consent framing</div>
          Statistics shown are population-level estimates, not predictions for an individual patient.<br><br>
          Outcomes vary with pathology, baseline neurology, comorbidities, timing, imaging, and treatment response. Use figures to structure discussion, not to script promises.<br><br>
          Final consent discussion should be individualized and documented by the treating clinician/team.
        </div>
        <p>The degree of recovery depends on mechanism and level of injury, age, comorbidities, timing of intervention, and most crucially, the <strong>severity of neurological injury</strong>.</p>
        <p>The key factor in predicting outcomes is whether the injury is <strong>complete or incomplete</strong>. Sacral sparing is the most reliable indicator of an incomplete injury. ${refLink(40)}</p>

        <h3 style="font-size:0.9rem;">Complete Injury</h3>
        <ul class="content-list">
          <li><strong>Tetraplegics:</strong> Among ASIA A patients, only 13% convert to incomplete status by 1 year ${refLink(41)}, and conversion does not always lead to significant functional improvement ${refLink(42)}</li>
          <li>Only ~2.3% of initially complete patients progress to ASIA D ${refLink(43)}</li>
          <li>Most recover function in 2&ndash;3 segments below the initial neurological level ${refLink(43)}</li>
          <li><strong>Paraplegics:</strong> Typically experience less recovery than tetraplegics ${refLink(44)}</li>
          <li>Conversion rate from ASIA A to B or D is about half that of tetraplegics ${refLink(44)}</li>
          <li>Most paraplegics (73%) do not experience a change in neurological level at 1 year ${refLink(45)}</li>
        </ul>

        <h3 style="font-size:0.9rem;">Incomplete Injury</h3>
        <ul class="content-list">
          <li>Patients with incomplete injuries have a higher likelihood of improvement</li>
          <li>Functional walking is more likely in ASIA B patients if injury preserves light touch and pinprick sensations, suggesting corticospinal tracts are more likely intact ${refLink(37)}</li>
        </ul>

        <h3 style="font-size:0.9rem;">Recovery Time</h3>
        <ul class="content-list">
          <li>Most neurological recovery occurs within the first <strong>6&ndash;9 months</strong>, typically plateauing at <strong>12&ndash;18 months</strong> ${refLink([43,40,45,46])}</li>
          <li>Rapid early improvement correlates with greater final recovery ${refLink(3)}</li>
        </ul>
      </div>
    </div>

    <div class="collapsible">
      <button class="collapsible-header" onclick="toggleCollapsible(this)">
        Key Complications
        <span class="chevron">&#9660;</span>
      </button>
      <div class="collapsible-body" style="font-size:0.85rem;">
        <p>Complications are generally higher in emergency spine surgeries. Patients may be in systemic inflammation impairing haemostasis, and operative time can be unpredictable. ${refLink(47)}</p>

        <div class="info-box" style="margin:12px 0;">
          <strong>Haemorrhage</strong><br>
          Bleeding is often more significant in emergency operations due to infections, malignancy, and inflammation (e.g. ankylosing spondylitis). Hypervascular tumours (renal cell, hepatocellular carcinoma) pose high risk. Pre-operative embolisation is not always feasible due to urgency. Heavy bleeding may necessitate massive transfusion, potentially leading to DIC, haemodynamic instability and death.
        </div>

        <div class="info-box" style="margin:12px 0;">
          <strong>Neurological Deficits</strong><br>
          Damage to neurological structures can occur due to positioning, instrumentation, manipulation, or spinal cord ischaemia. Explain risks in clear terms: potential weakness, paralysis, loss of sensation, new abnormal sensations, gait difficulties, bladder/bowel dysfunction, and sexual dysfunction.
        </div>

        <div class="info-box" style="margin:12px 0;">
          <strong>Dural Tears</strong><br>
          The dura is the outer membrane containing CSF, extending to S2. Tears can be traumatic or iatrogenic, especially when dura adheres to ligamentum flavum or pathological tissue. Unrepaired tears can lead to CSF leaks, postural headaches, dizziness, vomiting, and longer-term complications (fistula, meningitis, wound infections).
        </div>

        <div class="info-box" style="margin:12px 0;">
          <strong>Persistent, Recurrent, and New Pathology</strong><br>
          In spinal metastases, surgery is often palliative. Complete excision with clear margins is rarely feasible. Tumour recurrence can occur despite surgery and adjuvant therapy. Incomplete infection drainage may leave persistent foci. Decompressive surgeries can cause mechanical instability. Implant loosening, breakage, migration, delayed/failed fusion, and adjacent segment degeneration may develop.
        </div>
      </div>
    </div>

    <div class="collapsible">
      <button class="collapsible-header" onclick="toggleCollapsible(this)">
        Alternatives to Surgery
        <span class="chevron">&#9660;</span>
      </button>
      <div class="collapsible-body">
        <p>Patients should always be informed of non-operative options, regardless of how surgically amenable the pathology appears.</p>
        <ul class="content-list">
          <li><strong>Trauma:</strong> Orthoses and immobilisation</li>
          <li><strong>Infections:</strong> Antimicrobial therapy or percutaneous drainage</li>
          <li><strong>Malignancies:</strong> Chemotherapy or radiotherapy</li>
        </ul>
        <p>Patients should also be informed about the natural progression of the disease and potential consequences of opting for non-operative treatment.</p>
      </div>
    </div>

    <div class="collapsible">
      <button class="collapsible-header" onclick="toggleCollapsible(this)">
        Surgical Risk Comparison Table
        <span class="chevron">&#9660;</span>
      </button>
      <div class="collapsible-body">
        <table class="data-table">
          <thead><tr><th>Risk</th><th>Terminology</th><th>Rates Quoted</th></tr></thead>
          <tbody>
            ${SURGICAL_RISKS.map(function(r) {
              return '<tr><td><strong>' + r.risk + '</strong></td><td>' + r.terminology + '</td><td style="font-size:0.78rem;">' + r.rates + '</td></tr>';
            }).join('')}
          </tbody>
        </table>
        <p style="font-size:0.78rem;color:var(--grey-500);margin-top:8px;">Source: ${refLink(48)}</p>
      </div>
    </div>`;
}

function renderTheatreProcedureCards(procedures) {
  if (procedures.length === 0) {
    return '<p style="color:var(--grey-500);text-align:center;padding:20px;">No matching procedures found.</p>';
  }
  return procedures.map(function(p) {
    var catClass = 'cat-' + p.category.toLowerCase();
    return '<div class="procedure-card">' +
      '<span class="procedure-category ' + catClass + '">' + p.category + '</span>' +
      '<h4>' + p.name + '</h4>' +
      (p.assumptions ? '<p style="font-size:0.82rem;color:var(--grey-600);"><strong>Assumptions:</strong> ' + p.assumptions + '</p>' : '') +
      '<p style="font-size:0.82rem;"><strong>Procedure:</strong> ' + p.procedure + '</p>' +
      '<p style="font-size:0.82rem;margin-bottom:4px;"><strong>Instruments:</strong></p>' +
      '<ul class="content-list" style="font-size:0.82rem;">' + p.instruments.map(function(i) { return '<li>' + i + '</li>'; }).join('') + '</ul>' +
      '</div>';
  }).join('');
}

function filterTheatre(category) {
  theatreFilter = category;
  applyTheatreFilter();
}

function searchTheatre(query) {
  theatreSearch = query.toLowerCase();
  applyTheatreFilter();
}

function applyTheatreFilter() {
  var filtered = THEATRE_DATA.filter(function(p) {
    if (theatreFilter !== 'All' && p.category !== theatreFilter) return false;
    if (theatreSearch) {
      var searchable = (p.category + ' ' + p.name + ' ' + (p.assumptions || '') + ' ' + p.procedure + ' ' + p.instruments.join(' ')).toLowerCase();
      return searchable.indexOf(theatreSearch) !== -1;
    }
    return true;
  });
  document.getElementById('theatreProcedures').innerHTML = renderTheatreProcedureCards(filtered);
  // Update filter buttons
  document.querySelectorAll('.filter-btn').forEach(function(b) {
    b.classList.remove('active');
    if (b.textContent.trim() === theatreFilter) b.classList.add('active');
  });
}
